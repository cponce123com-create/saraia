services:
  # ─── Frontend (Nginx) ──────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - saraia-net

  # ─── Backend API (Express + Neon) ────────────────────────────
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:80,http://localhost:5173}
      - PORT=3001
      - NODE_ENV=production
    networks:
      - saraia-net

networks:
  saraia-net:
    driver: bridge
